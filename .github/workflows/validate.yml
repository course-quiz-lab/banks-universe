on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate config with custom errors
        uses: dsanders11/json-schema-validate-action@v2.0.0
        with:
          schema: "https://course-quiz-lab.github.io/json-schema/v1/bank.schema.json"
          files: ./**/*.json
          all-errors: true
